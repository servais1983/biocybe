name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Lint & format ----------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip && pip install ruff
      - run: ruff check src tests
      - run: ruff format --check src tests

  # ---------- Tests : Linux / macOS / Windows × Python 3.10–3.13 ----------
  test:
    name: Tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Aucune exclusion pour l'instant.
        # Ajouter ici si une combinaison OS×Python pose problème
        # (typiquement yara-python sans wheel pour la combo).
    steps:
      - uses: actions/checkout@v4

      - name: Install YARA system (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libyara-dev yara

      - name: Install YARA system (macOS)
        if: runner.os == 'macOS'
        run: brew install yara

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=biocybe --cov-report=xml --cov-report=term

      - name: Upload coverage (Linux / py3.12 only)
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ---------- Security audit ----------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit declared dependencies
        run: pip-audit --strict --desc -r requirements.txt
        continue-on-error: true  # remonté en warning ; à passer en failure une fois la baseline propre
      - name: Audit installed environment (core uniquement)
        run: |
          pip install -e .
          pip-audit --strict --desc
        continue-on-error: true

  # ---------- Build Docker image ----------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true        # rend l'image dispo dans le daemon local pour `docker run`
          tags: biocybe:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Inspect image
        run: |
          docker image ls biocybe:ci-${{ github.sha }}
          docker inspect biocybe:ci-${{ github.sha }} --format '{{ .Config.Entrypoint }} {{ .Config.Cmd }}'
      - name: Smoke test image — biocybe --help
        run: docker run --rm biocybe:ci-${{ github.sha }} --help
      - name: Smoke test image — biocybe scan --help
        run: docker run --rm biocybe:ci-${{ github.sha }} scan --help
      - name: Smoke test image — API healthz (avec --build-arg web)
        run: |
          docker build --build-arg BIOCYBE_EXTRAS=web -t biocybe:ci-web-${{ github.sha }} .
          docker run -d --name biocybe-api -p 8080:8080 \
            -e BIOCYBE_API_TOKEN=ci-test-token \
            biocybe:ci-web-${{ github.sha }} api serve --host 0.0.0.0 --port 8080
          # Attendre que l'API soit ready
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8080/healthz > /dev/null; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8080/healthz | tee /dev/stderr | grep -q '"status":"ok"'
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:8080/api/v1/info | grep -q "HTTP 401"
          curl -sf -H "Authorization: Bearer ci-test-token" http://127.0.0.1:8080/api/v1/info | tee /dev/stderr | grep -q '"api_version":"v1"'
          docker logs biocybe-api
          docker stop biocybe-api

      # ---- Phase 2.4.c — Supply chain : SBOM + vulnerability scan ----
      - name: Génération SBOM (SPDX + CycloneDX) avec syft
        uses: anchore/sbom-action@v0
        with:
          image: biocybe:ci-${{ github.sha }}
          format: spdx-json
          output-file: sbom-spdx.json
          upload-artifact: false
      - name: Génération SBOM CycloneDX
        uses: anchore/sbom-action@v0
        with:
          image: biocybe:ci-${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json
          upload-artifact: false
      - name: Scan vulnerabilities (grype)
        uses: anchore/scan-action@v6
        id: grype-scan
        with:
          image: biocybe:ci-${{ github.sha }}
          fail-build: false       # non-bloquant pour l'instant — on remontera la barre quand on aura purgé les vulns connues
          severity-cutoff: high
          output-format: sarif
      - name: Upload SBOM + scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-${{ github.sha }}
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
            ${{ steps.grype-scan.outputs.sarif }}
          retention-days: 30
      - name: Récap supply chain (visible dans les logs)
        if: always()
        run: |
          echo "=== SBOM SPDX ==="
          jq '.packages | length' sbom-spdx.json | xargs -I{} echo "Packages détectés : {}"
          echo "=== Vulnerabilities (grype) ==="
          if [ -n "${{ steps.grype-scan.outputs.sarif }}" ] && [ -f "${{ steps.grype-scan.outputs.sarif }}" ]; then
            jq '.runs[0].results | length' "${{ steps.grype-scan.outputs.sarif }}" | xargs -I{} echo "Findings : {}"
          fi
